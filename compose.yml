services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-opspilot}"
      POSTGRES_USER: "${POSTGRES_USER:-opspilot}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change_me_for_local_dev}"
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      APP_ENV: "${APP_ENV:-local}"
      API_HOST: "0.0.0.0"
      API_PORT: "${API_PORT:-8000}"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "${POSTGRES_DB:-opspilot}"
      POSTGRES_USER: "${POSTGRES_USER:-opspilot}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change_me_for_local_dev}"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-opspilot}:${POSTGRES_PASSWORD:-change_me_for_local_dev}@postgres:5432/${POSTGRES_DB:-opspilot}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:3000}"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      - postgres

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      APP_ENV: "${APP_ENV:-local}"
      API_HOST: "api"
      API_PORT: "${API_PORT:-8000}"
      WEB_PORT: "${WEB_PORT:-3000}"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  web_node_modules:
